<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vietnamese Hangman</title>
<style>


body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}

/* Welcome screen (keep it big!) */
#startScreen h1 {
    font-size: 80px;
    margin-bottom: 40px;
}

#startScreen button {
    font-size: 40px;
    padding: 20px 40px;
    border-radius: 15px;
    cursor: pointer;
}

/* Main game screen (slightly smaller to fit screens) */
#gameScreen #hangman {
    font-family: monospace;
    font-size: 40px;       /* reduced from 50px */
    margin-bottom: 30px;
}

#gameScreen #word {
    font-size: 60px;       /* reduced from 80px */
    letter-spacing: 12px;  /* slightly less spacing */
    margin: 30px 0;
    white-space: pre;
}

#gameScreen #letters button {
    font-size: 28px;       /* smaller buttons */
    padding: 15px 25px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

#gameScreen .controls button {
    font-size: 32px;       /* slightly smaller than before */
    padding: 15px 30px;
    margin: 15px 8px;
    border-radius: 10px;
    cursor: pointer;
}

#gameScreen #message {
    margin-top: 30px;
    font-size: 40px;       /* slightly smaller message */
    font-weight: bold;
}

.controls{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="margin-top:50px;">
    <h1>Welcome to Vietnamese Hangman!</h1>
    <button id="startBtn">▶ Play</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
    <pre id="hangman"></pre>
    <div id="word">Loading...</div>
    <div id="letters"></div>
    <div class="controls">
        <button id="listenBtn">🔊 Listen</button>
        <button id="nextBtn">Next Word</button>
    </div>
    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
