<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vietnamese Hangman</title>
<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}

/* Welcome screen (big and impressive) */
#startScreen h1 {
    font-size: 70px;
    margin-bottom: 30px;
}

#startScreen button {
    font-size: 36px;
    padding: 18px 36px;
    border-radius: 15px;
    cursor: pointer;
}

/* Main game screen – slightly smaller to fit viewport */
#gameScreen #hangman {
    font-family: monospace;
    font-size: 32px;       /* smaller hangman art */
    margin-bottom: 20px;
}

#gameScreen #word {
    font-size: 50px;       /* slightly smaller word */
    letter-spacing: 10px;
    margin: 20px 0;
    white-space: pre;
}

#gameScreen #letters button {
    font-size: 24px;       /* smaller letter buttons */
    padding: 12px 20px;
    margin: 4px;
    border-radius: 8px;
    cursor: pointer;
}

#gameScreen .controls button {
    font-size: 28px;       /* slightly smaller control buttons */
    padding: 12px 25px;
    margin: 12px 6px;
    border-radius: 8px;
    cursor: pointer;
}

#gameScreen #message {
    margin-top: 20px;
    font-size: 36px;       /* smaller win/loss message */
    font-weight: bold;
}

.controls{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="margin-top:50px;">
    <h1>Welcome to Vietnamese Hangman!</h1>
    <button id="startBtn">▶ Play</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
    <pre id="hangman"></pre>
    <div id="word">Loading...</div>
    <div id="letters"></div>
    <div class="controls">
        <button id="listenBtn">🔊 Listen</button>
        <button id="nextBtn">Next Word</button>
    </div>
    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
