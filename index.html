<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vietnamese Hangman</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
}

#word{
    font-size:60px;
    letter-spacing:12px;
    margin:20px;
    white-space: pre;
}

#letters button{
    margin:5px;
    padding:15px;
    font-size:24px;
}

#message{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
}

#hangman{
    font-family: monospace;
    font-size:30px;
    margin-bottom:20px;
}

.controls{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="margin-top:50px;">
    <h1>Welcome to Vietnamese Hangman!</h1>
    <button id="startBtn">▶ Play</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
    <pre id="hangman"></pre>
    <div id="word">Loading...</div>
    <div id="letters"></div>
    <div class="controls">
        <button id="listenBtn">🔊 Listen</button>
        <button id="nextBtn">Next Word</button>
    </div>
    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
