<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vietnamese Hangman</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
}

/* Welcome screen */
#startScreen h1 {
    font-size: 80px;       /* large title */
    margin-bottom: 40px;
}

#startScreen button {
    font-size: 40px;        /* large play button */
    padding: 20px 40px;
    border-radius: 15px;
    cursor: pointer;
}

#word{
    font-size:80px;
    letter-spacing:16px;
    margin: 40px 0;
    white-space: pre;
}

/* Letter buttons */
#letters button {
    font-size: 32px;        /* big letters */
    padding: 20px 30px;
    margin: 6px;
    border-radius: 12px;
    cursor: pointer;
}

/* Listen / Next buttons */
.controls button {
    font-size: 36px;        /* large control buttons */
    padding: 20px 40px;
    margin: 20px 10px;
    border-radius: 12px;
    cursor: pointer;
}

/* Message display */
#message {
    margin-top: 40px;
    font-size: 50px;
    font-weight: bold;
}

#hangman{
    font-family: monospace;
    font-size:50px;
    margin-bottom:40px;
}

.controls{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="margin-top:50px;">
    <h1>Welcome to Vietnamese Hangman!</h1>
    <button id="startBtn">▶ Play</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
    <pre id="hangman"></pre>
    <div id="word">Loading...</div>
    <div id="letters"></div>
    <div class="controls">
        <button id="listenBtn">🔊 Listen</button>
        <button id="nextBtn">Next Word</button>
    </div>
    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
