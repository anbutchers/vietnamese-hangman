<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vietnamese Hangman</title>
<style>

body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#word{
    font-size:40px;
    letter-spacing:8px;
    margin:20px;
    white-space: pre;
}

#letters button{
    margin:3px;
    padding:10px;
    font-size:16px;
}

#message{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

#hangman{
    font-family: monospace;
    font-size:20px;
    margin-bottom:20px;
}

#gameScreen {
    transform: scale(1.5); /* 150% */
    transform-origin: top center; /* keeps it aligned nicely */
}

.controls{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen" style="margin-top:50px;">
    <h1>Welcome to Vietnamese Hangman!</h1>
    <button id="startBtn">▶ Play</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none;">
    <pre id="hangman"></pre>
    <div id="word">Loading...</div>
    <div id="letters"></div>
    <div class="controls">
        <button id="listenBtn">🔊 Listen</button>
        <button id="nextBtn">Next Word</button>
    </div>
    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
